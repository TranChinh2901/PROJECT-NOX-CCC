# Logstash Configuration for Notification Logs
# Processes JSON logs and sends to Elasticsearch

input {
  # Read from application log files
  file {
    path => "/var/log/notification/*.log"
    start_position => "beginning"
    codec => "json"
    tags => ["notification-app"]
  }

  # Accept logs via TCP (for direct log shipping)
  tcp {
    port => 5000
    codec => "json"
    tags => ["notification-tcp"]
  }

  # Accept logs via Beats (Filebeat)
  beats {
    port => 5044
    tags => ["notification-beats"]
  }
}

filter {
  # Parse JSON if not already parsed
  if ![timestamp] {
    json {
      source => "message"
      target => "parsed"
    }

    # Move parsed fields to root
    ruby {
      code => "
        if event.get('[parsed]')
          event.get('[parsed]').each { |k, v|
            event.set(k, v)
          }
        end
      "
    }

    # Remove parsed field
    mutate {
      remove_field => ["parsed"]
    }
  }

  # Parse timestamp
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Add metadata
  mutate {
    add_field => {
      "[@metadata][index]" => "notification-logs-%{+YYYY.MM.dd}"
    }
  }

  # Parse error stack traces
  if [error][stack] {
    mutate {
      gsub => [
        "[error][stack]", "\n", " | "
      ]
    }
  }

  # Extract useful fields
  if [context][userId] {
    mutate {
      add_field => { "user_id" => "%{[context][userId]}" }
    }
  }

  if [context][notificationId] {
    mutate {
      add_field => { "notification_id" => "%{[context][notificationId]}" }
    }
  }

  if [context][correlationId] {
    mutate {
      add_field => { "correlation_id" => "%{[context][correlationId]}" }
    }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][index]}"
    document_type => "_doc"
  }

  # Debug output (optional - remove in production)
  # stdout {
  #   codec => rubydebug
  # }
}
