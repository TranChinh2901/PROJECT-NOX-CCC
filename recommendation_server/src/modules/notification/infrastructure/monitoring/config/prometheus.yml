# Prometheus Configuration for Notification System
# Save as: prometheus.yml

global:
  # How frequently to scrape targets
  scrape_interval: 15s

  # How frequently to evaluate rules
  evaluation_interval: 15s

  # Attach these labels to any time series or alerts
  external_labels:
    cluster: 'notification-cluster'
    environment: 'production'

# Load alerting rules
rule_files:
  - 'alerts/notification-alerts.yml'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'localhost:9093'

# Scrape configurations
scrape_configs:
  # Notification Service
  - job_name: 'notification-service'
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'localhost:3000'
        labels:
          service: 'notification'
          team: 'backend'

    # Relabeling for better metric organization
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'

  # Node exporter for system metrics (optional)
  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - 'localhost:9100'

  # Redis exporter (if using Redis)
  - job_name: 'redis'
    static_configs:
      - targets:
          - 'localhost:9121'
        labels:
          service: 'redis'
          component: 'cache'

  # MySQL exporter (if monitoring database)
  - job_name: 'mysql'
    static_configs:
      - targets:
          - 'localhost:9104'
        labels:
          service: 'mysql'
          component: 'database'

# Remote write (optional - for long-term storage)
# remote_write:
#   - url: 'https://prometheus-remote-storage.example.com/api/v1/write'
#     basic_auth:
#       username: 'your-username'
#       password: 'your-password'

# Storage configuration
storage:
  tsdb:
    # Data retention period
    retention.time: 30d

    # Maximum storage size
    retention.size: 50GB

    # Path to storage directory
    path: /var/lib/prometheus/data

# Query settings
query:
  # Maximum number of samples a single query can load into memory
  max_samples: 50000000

  # Maximum query execution time
  timeout: 2m

  # Maximum number of concurrent queries
  max_concurrency: 20
