# Grafana Datasources Configuration
# This file is automatically loaded by Grafana on startup

apiVersion: 1

datasources:
  # Prometheus datasource
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s
    version: 1

  # Elasticsearch datasource for logs
  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: "notification-logs-*"
    jsonData:
      timeField: "@timestamp"
      esVersion: "8.5.0"
      logMessageField: message
      logLevelField: level
    version: 1
